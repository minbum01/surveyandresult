<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<title>합격 리포트 — PAGE 1 우측 분석패널</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Noto+Serif+KR:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #FAFAF7;
  --bg-card: #FFFFFF;
  --bg-dark: #1A1A2E;
  --bg-accent: #F0EDE6;
  --bg-highlight: #FFF8E7;
  --text-primary: #1A1A2E;
  --text-secondary: #5A5A6E;
  --text-muted: #8E8E9E;
  --text-inverse: #FAFAF7;
  --accent-gold: #C8A84E;
  --accent-gold-light: #E8D59E;
  --accent-blue: #3A5BA0;
  --accent-blue-light: #E8EEF8;
  --accent-green: #2D8A5E;
  --accent-green-light: #E6F5ED;
  --accent-warm: #D4734A;
  --border-light: #E8E6DF;
  --shadow-sm: 0 1px 3px rgba(26,26,46,0.06);
  --shadow-md: 0 4px 12px rgba(26,26,46,0.08);
  --shadow-lg: 0 8px 30px rgba(26,26,46,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  padding: 16px;
  padding-bottom: 140px;
}

/* 페이지 + 디버그 가로 나란히 */
.layout-row {
  display: flex;
  gap: 20px;
  max-width: 1520px;
  margin: 0 auto;
  align-items: flex-start;
}

.page {
  flex: 0 0 900px;
  min-height: 720px;
  background: var(--bg-primary);
  border-radius: 8px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  position: relative;
}
.right-panel {
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.page-indicator {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  text-align: right;
  font-weight: 500;
}

/* 공통 섹션 카드 */
.section-card {
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-light);
  padding: 18px 22px;
  box-shadow: var(--shadow-sm);
}
.section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.section-icon { font-size: 16px; }
.section-title { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 700; }
.section-sub {
  margin-left: auto;
  font-size: 10.5px;
  color: var(--text-muted);
  font-weight: 500;
}

/* no.06 — 카드 2장 가로 */
.cards-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.mini-card {
  background: var(--bg-primary);
  border-radius: 8px;
  padding: 12px 14px;
  border-left: 3px solid var(--accent-blue);
}
.mini-card-title {
  font-weight: 700;
  color: var(--accent-blue);
  margin-bottom: 6px;
  font-size: 11px;
  line-height: 1.4;
}
.mini-card-passage {
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.65;
}

/* no.07 / no.09 / no.10 — 인용구 박스 */
.quote-block { padding: 4px 0; }
.quote-keyword {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 700;
  background: var(--bg-highlight);
  color: var(--accent-gold);
  padding: 3px 10px;
  border-radius: 12px;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.quote-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-primary);
  font-style: italic;
  position: relative;
  padding-left: 24px;
}
.quote-text::before {
  content: '"';
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: var(--accent-gold-light);
  position: absolute;
  top: -2px;
  left: 0;
  line-height: 1;
}
.quote-source {
  font-size: 10.5px;
  color: var(--text-muted);
  margin-top: 8px;
  padding-left: 24px;
}

/* no.08 — 발췌 본문 */
.excerpt-block { padding: 4px 0; }
.excerpt-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-primary);
  background: #FFFCF4;
  padding: 12px 14px;
  border-radius: 6px;
  border-left: 3px solid var(--accent-gold);
}
.excerpt-source {
  font-size: 10.5px;
  color: var(--text-muted);
  margin-top: 8px;
  padding-left: 4px;
}

/* dyn 마커 */
.dyn { position: relative; }
.dyn::before {
  content: '[선택지]';
  position: absolute; top: -7px; right: -4px;
  font-family: 'Courier New', monospace;
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.4px;
  background: #E50914; color: #fff;
  padding: 2px 6px; border-radius: 3px;
  z-index: 10; pointer-events: none;
  box-shadow: 0 1px 4px rgba(229,9,20,0.4);
  white-space: nowrap;
}
.dyn[data-q]::before { content: '[' attr(data-q) ']'; }
.dyn[data-q][data-no]::before { content: '[no.' attr(data-no) ' · ' attr(data-q) ']'; }
.dyn.from-review::before {
  background: #C8A84E; color: #1A1A2E;
  box-shadow: 0 1px 4px rgba(200,168,78,0.4);
}
.no-marker .dyn::before { display: none; }
@media print { .dyn::before { display: none; } }

/* Debug panel — 페이지 옆에 sticky */
.debug-panel {
  flex: 1;
  min-width: 380px;
  max-width: 600px;
  background: #fff;
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 18px 24px;
  font-size: 12px;
  position: sticky;
  top: 16px;
  max-height: calc(100vh - 180px);
  overflow-y: auto;
}
.debug-h {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px; font-weight: 700;
  margin-bottom: 8px; padding-left: 10px;
  border-left: 3px solid var(--accent-gold);
}
.debug-section { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px dashed var(--border-light); }
.debug-section:last-child { border-bottom: none; }
.debug-section-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.debug-grid {
  display: grid;
  grid-template-columns: 50px 1fr;
  gap: 4px 10px;
  font-size: 11.5px;
}
.debug-grid .qid { font-family: 'Courier New', monospace; color: var(--accent-blue); font-weight: 700; }
.debug-grid .val { color: var(--text-primary); font-weight: 600; }
.debug-area-row {
  display: grid;
  grid-template-columns: 70px 200px 1fr;
  gap: 12px;
  font-size: 11.5px;
  padding: 4px 0;
  align-items: baseline;
}
.debug-area-row .area-code { font-weight: 700; color: var(--accent-gold); font-family: 'Courier New', monospace; }
.debug-area-row .area-name { font-weight: 600; }
.debug-area-row .area-info { color: var(--text-secondary); font-size: 11px; }

/* Dev toolbar */
.dev-toolbar {
  position: fixed;
  bottom: 16px; left: 16px; right: 16px;
  background: var(--bg-dark);
  color: var(--text-inverse);
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 11px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.dt-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.dt-q { display: flex; gap: 4px; align-items: center; font-size: 11px; color: rgba(255,255,255,0.7); }
.dt-q strong { color: var(--accent-gold); font-weight: 700; }
.dt-q-label { color: var(--accent-gold); font-weight: 700; margin-right: 4px; font-size: 11px; }
.dt-checks { display: flex; gap: 10px; flex-wrap: wrap; }
.dt-checks label {
  display: flex; gap: 3px; align-items: center;
  font-size: 11px; color: rgba(255,255,255,0.75);
  cursor: pointer; user-select: none;
}
.dt-spacer { flex: 1; min-width: 8px; }
.dt-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.15); margin: 0 4px; }
.dev-toolbar button {
  background: var(--accent-gold);
  color: var(--bg-dark);
  border: none;
  padding: 5px 10px;
  border-radius: 4px;
  font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.dev-toolbar select {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px; font-family: inherit;
  max-width: 140px;
}
.dev-toolbar select option { background: #2a2a40; color: white; }

.loading {
  position: absolute; inset: 0;
  background: rgba(26,26,46,0.85);
  color: rgba(250,250,247,0.7);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; z-index: 50;
  border-radius: 8px;
}
.loading.hidden { display: none; }

.empty-msg { color: var(--text-muted); font-size: 11.5px; padding: 6px 0; }
</style>
</head>

</div>

// ─── 헬퍼 ───
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function splitSentences(text) {
  if (!text) return [];
  return text.split(/(?<=[.!?])\s+|\n+/).map(s => s.trim()).filter(s => s.length > 5);
}
function emptyHtml(msg) { return `<div class="empty-msg">${msg}</div>`; }

// no.06 — Q1×Q4 매칭, 분위기 좋은 후기 카드 2장
function renderNo06(passnotes) {
  const Q1 = get(0), Q4 = get(3);
  const KW_VIBE = ['처음','막막','시작','다행','됐','됩니다','버텼','꾸준','하루하루','놓지','마음'];
  const cands = passnotes.filter(p => {
    const ts = new Set(p.tags || []);
    return hasExpanded(ts, Q1) && hasExpanded(ts, Q4) && p.passage;
  });
  const scored = cands.map(p => {
    let s = 0;
    for (const k of KW_VIBE) if (p.passage.includes(k)) s += 1;
    if (p.passage.length >= 130 && p.passage.length <= 280) s += 3;
    return { p, s };
  });
  scored.sort((a, b) => b.s - a.s);
  const top2 = scored.slice(0, 2);
  if (top2.length === 0) {
    document.getElementById('sec06-body').innerHTML = emptyHtml('Q1×Q4 매칭 후기 없음');
    return { matched: 0 };
  }
  const html = top2.map(({p}) => {
    const psg = (p.passage || '').slice(0, 120);
    return `
      <div class="mini-card">
        <div class="mini-card-title">${escapeHtml(p.title || '')}</div>
        <div class="mini-card-passage">"${escapeHtml(psg)}…"</div>
      </div>`;
  }).join('');
  document.getElementById('sec06-body').innerHTML = html;
  return { matched: cands.length, picked: top2.length };
}

// no.07 — Q8 주제 인용구
function renderNo07(passnotes) {
  const Q8 = get(7);
  const q8kw = (Q8 && Q8_QUOTE_KW[Q8]) || [];
  if (!Q8 || q8kw.length === 0) {
    document.getElementById('sec07-body').innerHTML = emptyHtml('Q8 답변 미선택');
    return { matched: 0 };
  }
  const cands = passnotes.filter(p => {
    const ts = new Set(p.tags || []);
    return hasExpanded(ts, Q8) && p.quotes && p.quotes.length > 0;
  });
  const quotes = [];
  for (const p of cands) {
    for (const q of (p.quotes || [])) {
      const matched = q8kw.filter(k => q.includes(k));
      if (matched.length === 0) continue;
      let s = matched.length * 2;
      if (q.length >= 50 && q.length <= 130) s += 3;
      quotes.push({ q, p, s, kw: matched[0] });
    }
  }
  quotes.sort((a, b) => b.s - a.s);
  const best = quotes[0];
  if (!best) {
    document.getElementById('sec07-body').innerHTML = emptyHtml(`${Q8} 주제 인용구 없음`);
    return { matched: cands.length, picked: 0 };
  }
  document.getElementById('sec07-body').innerHTML = `
    <div class="quote-keyword">#${escapeHtml(best.kw)}</div>
    <div class="quote-text">${escapeHtml(best.q)}</div>
    <div class="quote-source">— ${escapeHtml(best.p.title || '')}</div>
  `;
  return { matched: cands.length, picked: 1, kw: best.kw };
}

// no.08 — Q1×Q3 매칭, 본문에서 "첫 달"/"처음에" 문장
function renderNo08(passnotes) {
  const Q1 = get(0), Q3 = get(2);
  const FM_KW = ['첫 달','첫달','처음에는','처음 시작','처음으로','시작했을 때','초반에','시작 무렵','처음 한 달'];
  const cands = passnotes.filter(p => {
    const ts = new Set(p.tags || []);
    return hasExpanded(ts, Q1) && jobMatch(p, Q3) && p.content;
  });
  const sents = [];
  for (const p of cands) {
    const all = splitSentences(p.content);
    for (const s of all) {
      const matchKW = FM_KW.find(k => s.includes(k));
      if (!matchKW) continue;
      if (s.length < 30 || s.length > 200) continue;
      let score = (s.length >= 60 && s.length <= 150) ? 3 : 1;
      if (matchKW === '첫 달' || matchKW === '첫달') score += 3;
      sents.push({ text: s, p, kw: matchKW, score });
    }
  }
  sents.sort((a, b) => b.score - a.score);
  const best = sents[0];
  if (!best) {
    document.getElementById('sec08-body').innerHTML = emptyHtml('"첫 달/처음에" 언급 문장 없음');
    return { matched: cands.length, picked: 0 };
  }
  document.getElementById('sec08-body').innerHTML = `
    <div class="excerpt-text">${escapeHtml(best.text)}</div>
    <div class="excerpt-source">— ${escapeHtml(best.p.title || '')}</div>
  `;
  return { matched: cands.length, picked: 1, kw: best.kw };
}

// no.10 — Q1~Q8 일치도 상위, "꾸준/매일/하루하루" 키워드 인용구
function renderNo10(passnotes) {
  const STEADY_KW = ['꾸준','매일','하루하루','스스로','한 발','조금씩','놓지'];
  const Q7 = getMulti(6);
  const scored = passnotes.map(p => {
    const ts = new Set(p.tags || []);
    let s = 0;
    if (hasExpanded(ts, get(0))) s++;
    if (hasExpanded(ts, get(1))) s++;
    if (hasExpanded(ts, get(2))) s++;
    if (hasExpanded(ts, get(3))) s++;
    if (hasExpanded(ts, get(4))) s++;
    if (hasExpanded(ts, get(5))) s++;
    if (Q7.length === 0 || Q7.some(q => hasExpanded(ts, q))) s++;
    if (hasExpanded(ts, get(7))) s++;
    return { p, s };
  }).filter(x => x.s >= 5);
  scored.sort((a, b) => b.s - a.s);
  const top = scored.slice(0, 60);
  const quotes = [];
  for (const x of top) {
    for (const q of (x.p.quotes || [])) {
      const matched = STEADY_KW.filter(k => q.includes(k));
      if (matched.length === 0) continue;
      let s = matched.length * 2 + (x.s / 8) * 3;
      if (q.length >= 40 && q.length <= 110) s += 3;
      quotes.push({ q, p: x.p, s, kw: matched[0], hits: x.s });
    }
  }
  quotes.sort((a, b) => b.s - a.s);
  const best = quotes[0];
  if (!best) {
    document.getElementById('sec10-body').innerHTML = emptyHtml('꾸준함 키워드 인용구 없음');
    return { matched: top.length, picked: 0 };
  }
  document.getElementById('sec10-body').innerHTML = `
    <div class="quote-keyword">#${escapeHtml(best.kw)}</div>
    <div class="quote-text">${escapeHtml(best.q)}</div>
    <div class="quote-source">— ${escapeHtml(best.p.title || '')}</div>
  `;
  return { matched: top.length, picked: 1, kw: best.kw, hits: best.hits };
}

    ['no.08', '첫 한 달 풍경 (Q1×Q3)', fmt(r8)],
    ['no.09', '포기 직전 (Q1+슬럼프KW)', fmt(r9)],
    ['no.10', '꾸준함 한 줄 (Q1~Q8 일치도)', fmt(r10, r10.hits ? ` · 일치도 ${r10.hits}/8` : '')],
  ];
  document.getElementById('dbg-areas').innerHTML = areas.map(([code, name, info]) =>
    `<div class="debug-area-row"><span class="area-code">${code}</span><span class="area-name">${name}</span><span class="area-info">${info}</span></div>`
  ).join('');
}

// ─── 답변 빌더 (persona 동일) ───
const Q_OPTIONS = {
  Q1: [['전업수험생','전업 수험생'],['직장병행','직장 다니면서'],['재학수험생','학교 다니면서'],['육아병행','육아하면서'],['퇴직수험생','은퇴·퇴직 후'],['아르바이트병행','아르바이트하면서']],
  Q2: [['국가직9급','국가직 공무원'],['지방직9급','지방직 공무원'],['서울시9급','서울시 공무원']],
  Q3: [['행정직','일반행정직'],['세무직','세무/관세직'],['공안직','공안직'],['교육직','교육행정직'],['기술직','기술직'],['간호보건직','간호보건직'],['사회복지직','사회복지직'],['기타직렬','기타직렬']],
  Q4: [['노베이스','공부는 처음이야'],['수능베이스','수능 경험 있음'],['전공자','전공자'],['토익베이스','영어 성적 있음']],
  Q5: [['1년이내','1년 이내'],['1년이상','1년 이상']],
  Q6: [['하루10시간미만','10시간 미만'],['하루10시간이상','10시간 이상']],
  Q7: [['인강병행','인강 중심'],['기출반복','기출 반복'],['회독반복','회독 반복'],['독학위주','독학 위주'],['노량진현강','노량진 현강'],['스터디병행','스터디 그룹']],
  Q8: [['멘탈관리','멘탈 관리'],['슬럼프극복','슬럼프'],['영어약자','영어가 약해요'],['효율중심','시간이 부족하다'],['이해중심학습','공부법을 모르겠다'],['커리큘럼중심','커리큘럼을 못 잡겠다']],
};
function buildSelectors() {
  for (const qk of ['Q1','Q2','Q3','Q4','Q5','Q6','Q8']) {
    const sel = document.getElementById('sel-' + qk.toLowerCase());
    sel.innerHTML = Q_OPTIONS[qk].map(([id, lbl]) => `<option value="${id}">${lbl}</option>`).join('');
    sel.addEventListener('change', applyCustom);
  }
  const q7c = document.getElementById('q7-checks');
  q7c.innerHTML = Q_OPTIONS.Q7.map(([id, lbl]) =>
    `<label><input type="checkbox" data-q7="${id}" data-label="${lbl}"> ${lbl}</label>`
  ).join('');
  q7c.querySelectorAll('input').forEach(cb => cb.addEventListener('change', applyCustom));
}
function applyCustom() {
  const newA = [];
  for (const qk of ['Q1','Q2','Q3','Q4','Q5','Q6']) {
    const sel = document.getElementById('sel-' + qk.toLowerCase());
    const opt = sel.options[sel.selectedIndex];
    newA.push([{ tagId: opt.value, label: opt.text }]);
  }
  const q7sel = [...document.querySelectorAll('#q7-checks input:checked')].map(cb => ({ tagId: cb.dataset.q7, label: cb.dataset.label }));
  newA.push(q7sel);
  const q8 = document.getElementById('sel-q8');
  newA.push([{ tagId: q8.value, label: q8.options[q8.selectedIndex].text }]);
  A = newA; loadAndRender();
}
function syncSelectorsFromA() {
  for (const i of [0,1,2,3,4,5,7]) {
    const sel = document.getElementById('sel-q' + (i+1));
    if (sel && A[i]?.[0]?.tagId) sel.value = A[i][0].tagId;
  }
  const q7ids = (A[6] || []).map(x => x.tagId);
  document.querySelectorAll('#q7-checks input').forEach(cb => { cb.checked = q7ids.includes(cb.dataset.q7); });
}
buildSelectors();
syncSelectorsFromA();
document.getElementById('demo-select').addEventListener('change', (e) => {
  if (!e.target.value) return;
  A = DEMO_SETS[parseInt(e.target.value, 10)];
  syncSelectorsFromA();
  loadAndRender();
});
loadAndRender();
</script>
