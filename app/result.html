<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>합격 가능성 리포트</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Noto+Serif+KR:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FAFAF7;
            --bg-card: #FFFFFF;
            --bg-dark: #1A1A2E;
            --bg-accent: #F0EDE6;
            --bg-highlight: #FFF8E7;
            --text-primary: #1A1A2E;
            --text-secondary: #5A5A6E;
            --text-muted: #8E8E9E;
            --text-inverse: #FAFAF7;
            --accent-gold: #C8A84E;
            --accent-gold-light: #E8D59E;
            --accent-blue: #3A5BA0;
            --accent-blue-light: #E8EEF8;
            --accent-green: #2D8A5E;
            --accent-green-light: #E6F5ED;
            --accent-warm: #D4734A;
            --accent-warm-light: #FFF0EB;
            --border-light: #E8E6DF;
            --border-medium: #D0CEC7;
            --shadow-sm: 0 1px 3px rgba(26, 26, 46, 0.06);
            --shadow-md: 0 4px 12px rgba(26, 26, 46, 0.08);
            --shadow-lg: 0 8px 30px rgba(26, 26, 46, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            width: 1280px;
            height: 720px;
            margin: 20px auto;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
        }

        /* ===== PAGE 1 ===== */
        .page-1 {
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: 1fr;
        }

        /* LEFT PANEL - Report Card */
        .report-card {
            background: var(--bg-dark);
            color: var(--text-inverse);
            padding: 36px 32px 28px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .report-card::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(200, 168, 78, 0.12) 0%, transparent 70%);
            border-radius: 50%;
        }

        .report-card::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(58, 91, 160, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .report-header {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .report-brand {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .report-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 19px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .report-subtitle {
            font-size: 12.5px;
            color: rgba(250, 250, 247, 0.6);
            line-height: 1.6;
            font-weight: 300;
        }

        .empathy-stat {
            background: rgba(200, 168, 78, 0.1);
            border: 1px solid rgba(200, 168, 78, 0.2);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .empathy-stat p {
            font-size: 11.5px;
            color: rgba(250, 250, 247, 0.8);
            line-height: 1.6;
        }

        .empathy-stat strong {
            color: var(--accent-gold-light);
            font-weight: 600;
        }

        .tag-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .tag {
            font-size: 10.5px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(250, 250, 247, 0.08);
            border: 1px solid rgba(250, 250, 247, 0.15);
            color: rgba(250, 250, 247, 0.75);
            font-weight: 400;
        }

        .tag.primary {
            background: rgba(200, 168, 78, 0.15);
            border-color: rgba(200, 168, 78, 0.3);
            color: var(--accent-gold-light);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .metric-card {
            background: rgba(250, 250, 247, 0.05);
            border: 1px solid rgba(250, 250, 247, 0.08);
            border-radius: 10px;
            padding: 14px 12px;
            text-align: center;
        }

        .metric-value {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--accent-gold-light);
            line-height: 1;
            margin-bottom: 4px;
        }

        .metric-value .unit {
            font-size: 14px;
            font-weight: 700;
            margin-left: 1px;
        }

        .metric-label {
            font-size: 10.5px;
            color: rgba(250, 250, 247, 0.55);
            font-weight: 400;
        }

        .analysis-text {
            font-size: 12px;
            line-height: 1.8;
            color: rgba(250, 250, 247, 0.7);
            position: relative;
            z-index: 1;
            flex: 1;
            font-weight: 300;
        }

        .analysis-text strong {
            color: rgba(250, 250, 247, 0.95);
            font-weight: 500;
        }

        /* RIGHT PANEL */
        .right-panel {
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .page-indicator {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            text-align: right;
            font-weight: 500;
        }

        .section-block {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            padding: 20px 22px;
            box-shadow: var(--shadow-sm);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .section-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .section-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 14px;
            font-weight: 700;
        }

        .section-badge {
            margin-left: auto;
            font-size: 10.5px;
            color: var(--text-muted);
            background: var(--bg-accent);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* Section A */
        .combo-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 12px;
            background: var(--accent-blue-light);
            padding: 5px 12px;
            border-radius: 6px;
        }

        .combo-label .sep {
            color: var(--accent-blue);
            opacity: 0.4;
        }

        .data-row-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }

        .data-cell {
            text-align: center;
            padding: 8px 4px;
            background: var(--bg-primary);
            border-radius: 8px;
        }

        .data-cell-value {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .data-cell-value .small-unit {
            font-size: 12px;
            font-weight: 700;
        }

        .data-cell-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .pattern-box {
            display: flex;
            gap: 10px;
        }

        .pattern-item {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-highlight);
            border-radius: 8px;
            border-left: 3px solid var(--accent-gold);
        }

        .pattern-item-label {
            font-size: 9.5px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pattern-item-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        /* Section B */
        .goal-check-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .distribution-chart {
            position: relative;
        }

        .dist-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .dist-bar-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .dist-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dist-bar-label {
            font-size: 10px;
            color: var(--text-muted);
            width: 60px;
            text-align: right;
            flex-shrink: 0;
        }

        .dist-bar-track {
            flex: 1;
            height: 16px;
            background: var(--bg-accent);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .dist-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--accent-blue-light);
            transition: width 0.6s ease;
        }

        .dist-bar-fill.mine {
            background: var(--accent-blue);
        }

        .dist-bar-fill.highlight {
            background: var(--accent-gold);
        }

        .dist-bar-pct {
            font-size: 9.5px;
            color: var(--text-muted);
            width: 32px;
            flex-shrink: 0;
        }

        .my-marker {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--accent-blue);
            font-weight: 600;
            margin-top: 8px;
            padding: 4px 10px;
            background: var(--accent-blue-light);
            border-radius: 4px;
        }

        .verdict-box {
            background: var(--accent-green-light);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .verdict-box.warning {
            background: var(--accent-warm-light);
        }

        .verdict-label {
            font-size: 10px;
            color: var(--accent-green);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .verdict-box.warning .verdict-label {
            color: var(--accent-warm);
        }

        .verdict-text {
            font-family: 'Noto Serif KR', serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-green);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .verdict-box.warning .verdict-text {
            color: var(--accent-warm);
        }

        .verdict-detail {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .verdict-detail strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ===== PAGE 2 ===== */
        .page-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 0;
            padding: 28px 32px 20px;
        }

        .page2-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .page2-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 18px;
            font-weight: 700;
        }

        /* Stories */
        .stories-section {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 16px;
        }

        .story-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 18px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .story-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .story-card:nth-child(1)::before { background: var(--accent-gold); }
        .story-card:nth-child(2)::before { background: var(--accent-blue); }
        .story-card:nth-child(3)::before { background: var(--accent-green); }

        .story-match {
            font-size: 10px;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 6px;
        }

        .story-profile {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .story-quote {
            font-family: 'Noto Serif KR', serif;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
            font-style: italic;
            flex: 1;
            padding: 10px 0;
            border-top: 1px solid var(--border-light);
            position: relative;
        }

        .story-quote::before {
            content: '\201C';
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: var(--accent-gold-light);
            position: absolute;
            top: 2px;
            left: 0;
            line-height: 1;
        }

        .story-quote p {
            padding-left: 22px;
        }

        .story-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .story-tag {
            font-size: 9px;
            padding: 2px 7px;
            background: var(--bg-accent);
            border-radius: 10px;
            color: var(--text-muted);
        }

        .story-tag.matched {
            background: var(--accent-gold);
            color: white;
        }

        /* Bottom Grid */
        .bottom-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr 280px;
            gap: 14px;
            margin-bottom: 16px;
        }

        .insight-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 18px;
            box-shadow: var(--shadow-sm);
        }

        .insight-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .insight-icon { font-size: 14px; }

        .insight-title {
            font-size: 12.5px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .regret-item { margin-bottom: 10px; }

        .regret-stat {
            font-size: 10.5px;
            color: var(--accent-warm);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .regret-text {
            font-size: 11.5px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .regret-tip {
            font-size: 11px;
            background: var(--accent-warm-light);
            padding: 8px 10px;
            border-radius: 6px;
            color: var(--text-primary);
            line-height: 1.5;
            margin-top: 6px;
        }

        .regret-tip strong { font-weight: 600; }

        .first-month-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .fm-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .fm-number {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-blue);
            color: white;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .fm-content {
            font-size: 11.5px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .fm-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .fm-pct {
            font-size: 10px;
            color: var(--accent-blue);
            font-weight: 600;
        }

        /* Hard Subject */
        .hard-subject {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 18px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
        }

        .subject-bars {
            display: flex;
            flex-direction: column;
            gap: 7px;
            flex: 1;
        }

        .subject-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subject-name {
            font-size: 11px;
            width: 50px;
            text-align: right;
            color: var(--text-secondary);
            flex-shrink: 0;
            font-weight: 500;
        }

        .subject-bar-track {
            flex: 1;
            height: 14px;
            background: var(--bg-accent);
            border-radius: 3px;
            overflow: hidden;
        }

        .subject-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--accent-warm);
            opacity: 0.7;
            transition: width 0.6s ease;
        }

        .subject-bar-fill.top {
            opacity: 1;
            background: var(--accent-warm);
        }

        .subject-pct {
            font-size: 10px;
            color: var(--text-muted);
            width: 28px;
            flex-shrink: 0;
        }

        .subject-tip {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-light);
            font-size: 10.5px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* CTA Footer */
        .cta-footer {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 18px 28px;
            position: relative;
            overflow: hidden;
        }

        .cta-footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(200, 168, 78, 0.08) 0%, transparent 60%);
        }

        .cta-message {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .cta-closing-quote {
            font-family: 'Noto Serif KR', serif;
            font-size: 13px;
            color: rgba(250, 250, 247, 0.7);
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .cta-closing-source {
            font-size: 10px;
            color: rgba(250, 250, 247, 0.4);
        }

        .cta-buttons {
            display: flex;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-dark);
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(200, 168, 78, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: rgba(250, 250, 247, 0.7);
            border: 1px solid rgba(250, 250, 247, 0.2);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.15s ease;
        }

        .btn-secondary:hover {
            border-color: rgba(250, 250, 247, 0.5);
            color: rgba(250, 250, 247, 0.95);
        }

        /* Print Goal Box */
        .print-goal-box {
            display: none;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            body { background: white; }

            .page {
                width: 100%;
                height: auto;
                margin: 0;
                box-shadow: none;
                border-radius: 0;
                page-break-after: always;
                page-break-inside: avoid;
            }

            .page-1 { min-height: 100vh; }
            .page-2 { min-height: 100vh; }

            .cta-footer .btn-primary,
            .cta-footer .btn-secondary {
                display: none;
            }

            .print-goal-box {
                display: block !important;
                grid-column: 1 / -1;
                border: 2px solid var(--border-medium);
                border-radius: 12px;
                padding: 24px;
                margin-top: 8px;
            }

            .print-goal-title {
                font-size: 12px;
                font-weight: 600;
                color: var(--text-muted);
                margin-bottom: 16px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .print-goal-line {
                border-bottom: 1px solid var(--border-medium);
                padding: 10px 0;
                font-size: 13px;
                color: var(--text-secondary);
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .print-goal-line .blank {
                flex: 1;
                border-bottom: 1px solid var(--border-medium);
                min-width: 120px;
            }

            .print-qr-area {
                text-align: right;
                margin-top: 12px;
                font-size: 10px;
                color: var(--text-muted);
            }
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-block,
        .story-card,
        .insight-card,
        .hard-subject {
            animation: fadeUp 0.5s ease both;
        }

        .section-block:nth-child(2) { animation-delay: 0.1s; }
        .section-block:nth-child(3) { animation-delay: 0.2s; }

const SCORE_LABELS = ['','매우 도전적','어려운 목표','도전 가능','현실적','충분히 가능'];
const PERIOD_LABEL = {'6개월미만':'6개월 미만','6개월~1년':'6개월~1년','1년~1년6개월':'1년~1년6개월','1년6개월~2년':'1년6개월~2년','2년~3년':'2년 이상'};

// ═══════════════ GENERATE ANALYSIS ═══════════════
function generateAnalysis() {
  const SITU = { '전업수험생':'전업 수험생으로 공부에 모든 시간을 투자하는 환경', '직장병행':'직장을 다니며 퇴근 후 시간을 쪼개는 환경', '재학수험생':'학업과 수험을 병행하는 환경', '육아병행':'육아와 공부를 동시에 병행하는 환경', '퇴직수험생':'퇴직 후 새로운 출발선에 선 환경', '아르바이트병행':'알바와 공부를 동시에 소화해야 하는 환경' };
  const BASE = { '노베이스':'관련 배경지식 없이 백지에서 출발', '수능베이스':'수능 학습 경험을 토대로 출발', '전공자':'관련 전공 지식을 갖추고 출발', '이과출신':'이과식 논리 사고를 바탕으로 출발', '토익베이스':'영어 실력을 무기로 삼아 출발' };
  const STYLE_T = { '인강병행':'인터넷 강의 중심 학습', '기출반복':'기출문제 반복 풀이', '회독반복':'교재 회독 반복', '독학위주':'자기주도 독학', '노량진현강':'노량진 현장 강의', '스터디병행':'스터디 그룹 활용' };
  const CNC_T = { '멘탈관리':'멘탈 관리', '슬럼프극복':'슬럼프 극복', '영어약자':'영어 실력 보완', '효율중심':'시간 효율 극대화', '이해중심학습':'올바른 공부법 확립', '커리큘럼중심':'체계적 커리큘럼 설정' };
  const PERIOD_T = { '6개월미만':'6개월 미만', '6개월~1년':'6개월~1년', '1년~1년6개월':'1년~1년 6개월', '1년6개월~2년':'1년 6개월~2년', '2년~3년':'2년 이상' };
  const styleTxt = styleIds.map(s => STYLE_T[s]||s).join(' + ');

  let line3;
  if (realismScore <= 1) {
    line3 = `단, 목표 기간 <strong>${PERIOD_T[periodId]||periodId}</strong>은 현재 상황과 시간을 고려할 때 <strong>매우 도전적입니다</strong>. 기간을 현실적으로 재설정하는 것이 합격 확률을 높이는 첫 번째 결정입니다.`;
  } else if (realismScore <= 2) {
    line3 = `다만 목표 기간 <strong>${PERIOD_T[periodId]||periodId}</strong>은 현재 상황 대비 <strong>다소 빡빡한 설정</strong>입니다. 기간 조정 또는 학습 시간 확대를 검토해보세요.`;
  } else if (realismScore >= 5) {
    line3 = `목표 기간 <strong>${PERIOD_T[periodId]||periodId}</strong>은 현재 상황과 학습 시간을 고려할 때 <strong>충분히 달성 가능한 현실적인 목표</strong>입니다.`;
  } else {
    line3 = `목표 기간 <strong>${PERIOD_T[periodId]||periodId}</strong>은 현재 상황을 고려했을 때 <strong>현실적인 수준</strong>입니다. 꾸준한 루틴을 지키면 달성 가능합니다.`;
  }

  return [
    `당신은 <strong>${SITU[situId]||situId}</strong>에서, <strong>${BASE[baseId]||baseId}</strong>하는 수험생입니다.`,
    `당신과 비슷한 조건의 합격자 <strong>${st.match}명</strong>을 분석했습니다. 이들은 평균 <strong>${st.period}</strong> 만에 합격했으며, 당신과 같은 상황에서 실제로 해낸 사람들입니다.`,
    line3,
    `선택한 <strong>${styleTxt}</strong> 방식과 함께, 현재 <strong>${CNC_T[cncId]||cncId}</strong>가 가장 큰 과제로 분석됩니다. 비슷한 상황 합격자들은 이 문제에 선제적으로 대응한 것이 결정적 차이였습니다.`,
    `완벽한 준비보다 <strong>지금 바로 루틴을 시작하는 것</strong>이 합격의 시작입니다. 커리큘럼을 확정하고 오늘 첫 페이지를 펴세요.`,
  ];
}

          <div class="subject-bar-fill ${i===0?'top':''}" style="width: ${s.pct}%;"></div>
        </div>
        <div class="subject-pct">${s.pct}%</div>
      </div>`).join('')}
    </div>
    <div class="subject-tip">
      &#x1F4A1; ${baseId} 합격자 대부분이 <strong>${topSubj.name}을 가장 먼저</strong> 시작했습니다. "어려운 과목일수록 일찍 시작"이 공통 전략이었습니다.
    </div>`;

  // ── CTA footer
  const closingQuotes = {
    '전업수험생': {q:'합격하고 나니까 그때 고민했던 것들이 다 별거 아니었어요. 시작한 것 자체가 반은 한 겁니다.', s:'전업수험생 합격자 수기 중'},
    '직장병행':   {q:'합격하고 나니까 그때 고민했던 것들이 다 별거 아니었어요. 시작한 것 자체가 반은 한 겁니다.', s:`직장병행 ${mp.period.replace('개월','')}개월 합격자 수기 중`},
    '재학수험생': {q:'방학 때 시작한 게 최고의 선택이었어요. 졸업 전에 합격장 받는 기분은 진짜 말로 표현 못 합니다.', s:'재학수험생 합격자 수기 중'},
    '육아병행':   {q:'아이가 자는 새벽에 공부한 시간이 쌓여서 기적이 되었습니다.', s:'육아병행 합격자 수기 중'},
    '퇴직수험생': {q:'늦게 시작했지만 사회 경험이 무기가 되었습니다. 시작이 반입니다.', s:'퇴직수험생 합격자 수기 중'},
    '아르바이트병행':{q:'시간이 없어서 기출만 팠는데, 그게 정답이었어요.', s:'알바병행 합격자 수기 중'},
  };
  const cq = closingQuotes[situId] || closingQuotes['전업수험생'];
  document.getElementById('r-cta-quote').textContent = `"${cq.q}"`;
  document.getElementById('r-cta-source').textContent = `\u2014 ${cq.s}`;
}

// ═══════════════ INIT ═══════════════
populatePage();

// Restart button
document.getElementById('btn-restart').addEventListener('click', () => {
  localStorage.removeItem('surveyAnswers');
  window.location.href = 'survey.html';
});
</script>
